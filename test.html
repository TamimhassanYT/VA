<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxelAdder | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">VOXEL<span>ADDER</span></div>
            <div class="auth-zone" id="auth-zone">
                <button class="btn-loading">Checking Auth...</button>
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1>UNLEASH THE <span class="accent">ARSENAL</span></h1>
            <p>Join the ultimate Guns PVP experience. Custom weapons, headshot mechanics, and zero-lag performance.</p>
            
            <div class="dashboard-card" id="user-card" style="display: none;">
                <div class="user-info">
                    <img id="user-avatar" src="" alt="Avatar">
                    <div>
                        <h3 id="user-name">Loading...</h3>
                        <p id="user-id" class="subtext"></p>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span>Rank</span>
                        <strong>Recruit</strong>
                    </div>
                    <div class="stat-item">
                        <span>Server Status</span>
                        <strong class="online">ONLINE</strong>
                    </div>
                </div>
                <a href="/api/auth/logout" class="btn-logout">Sign Out</a>
            </div>

            <div id="guest-view">
                <a href="https://discord.com/api/oauth2/authorize?client_id=1479417445260464171&redirect_uri=https%3A%2F%2Fvoxeladder.zanity.net%2Fapi%2Fauth%2Fcallback&response_type=code&scope=identify" class="btn-login">
                    Login with Discord
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
