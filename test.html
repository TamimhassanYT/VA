<!DOCTYPE html>
<html>
  <head>
    <script>
      async function updateAuthUI() {
        try {
          const response = await fetch('/api/me');
          const user = await response.json();
      
          const statusText = document.getElementById('auth-status'); // Create this element in HTML
          const loginBtn = document.getElementById('login-btn');     // Your login button
      
          if (user.loggedIn) {
            statusText.innerText = `Welcome back! User ID: ${user.id}`;
            if (loginBtn) loginBtn.style.display = 'none'; // Hide login button
            
            // Optional: Show a logout button
            console.log("User is logged in with ID:", user.id);
          } else {
            statusText.innerText = "You are not logged in.";
            if (loginBtn) loginBtn.style.display = 'block';
          }
        } catch (err) {
          console.error("Failed to check auth status:", err);
        }
      }

// Run this as soon as the page loads
updateAuthUI();
    </script>
  </head>
  <body>
    <button id="login-status">ls</button>
    <button id="login-btn">fla</button>
    <button onclick="window.location.href = 'https://discord.com/oauth2/authorize?client_id=1479417445260464171&response_type=code&redirect_uri=https%3A%2F%2Fvoxeladder.zanity.net%2Fapi%2Fauth%2Fcallback&scope=identify'">Sign up with Discord</button>
  </body>
</html>
