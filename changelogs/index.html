<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap">
<link rel="stylesheet" type="text/css" href="https://voxeladder.strangled.net/header.css">
<link rel="icon" href="https://voxeladder.strangled.net/favicon.ico">
<title>Changelogs- VoxelAdder</title>
<style>
body {
	margin: 0;
	background-color: rgba(8, 8, 8, 0.9);
	width: 100%; /* Using 100% instead of 100vw prevents scroll issues */
	overflow-x: hidden;
	min-height: 100vh;
}

.vaheader {
	background-color: rgb(71, 71, 71, 0.9);
	position: sticky;
	top: 0; /* Required for sticky to work */
	border-radius: 0px 0px 5px 5px;
	padding: 10px;
	display: grid;
	grid-template-columns: 10% 90%;
	z-index: 2;
}

.vaheader h1 {
	margin: 0;
	font-family: "Archivo Black", sans-serif;
	font-weight: 400;
	text-shadow: 0px 0px 16px white;
	color: rgb(227, 226, 225);
	transition: 1.5s;
}

.hbtn {
	background-color: #1e1e1e;
	border: 1px solid white;
	border-radius: 5px;
	margin: 1px 10px 1px 10px;
	padding: 10px 20px 10px 20px;
	color: white;
	transition: 0.4s;
	transition-timing-function: ease-in-out;
	opacity: 0.6;
}

.vaheader h1:hover {
	color: rgb(255, 255, 255, 1);
	text-shadow: 0 0 12px white;
}

.hbtn:hover {
	background-color: white;
	border: 1px solid black;
	color: black;
	opacity: 0.8;
}

.hbtns {
	display: flex;
	justify-content: right;
	padding-right: 30px;
}

.topbox {
	width: 100vw;
	display: flex;
	justify-content: center;
	padding-top: 3vw;
}

#clbg {
	width: 95vw;
	min-height: 50vh;
	background-color: #828282;
	border-radius: 10px;
}
</style>
</head>
<body>
	<div class="vaheader">
		<h1 id="vah1" onclick="window.location.href = 'https://voxeladder.github.io/'">VoxelAdder</h1>
		<div class="hbtns">
			<div class="menu">
				<button class="mmenu">Menu</button>
				<div class="menul">
					<button id="mbtn" onclick="window.location.href = 'https://voxeladder.github.io/changelogs/'">Changelog</button>
					<button id="mbtn" onclick="window.location.href = 'https://voxeladder.github.io/wiki/'">Wiki</button>
					<button id="mbtn" onclick="window.location.href = 'https://voxeladder.github.io/va-dev'">Voxeladder Development</button>
				</div>
			</div>
		</div>
	</div>
<div class="topbox">
	<div id="clbg">
	</div>
</div>
</body>
</html>
